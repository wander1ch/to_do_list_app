services:
  todolist-postgres:
    image: postgres:18.4-bookworm
    container_name: todolist-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ${PROJECT_ROOT}/out/pgdata:/var/lib/postgresql
    restart: always
  todolist-postgres-migrate:
    image: migrate/migrate:4
    volumes:
      - ${PROJECT_ROOT}/migrations:/migrations
  port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: todolist-postgres-port-forwarder
    command: tcp-listen:5432,fork,reuseaddr tcp-connect:todolist-postgres:5432
    ports:
      - "127.0.0.1:5432:5432"
